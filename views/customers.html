<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Müşteriler — OpenProcess</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header"><div><button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='4' x2='20' y1='12' y2='12'/><line x1='4' x2='20' y1='6' y2='6'/><line x1='4' x2='20' y1='18' y2='18'/></svg></button><div class="page-title">Müşteriler</div></div><button class="btn btn-primary" onclick="openModal('newCustModal')"><svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12h14'/><path d='M12 5v14'/></svg> Yeni Müşteri</button></div>
      <div class="page-body">
        <div class="mb-24"><input type="text" class="form-input" id="custSearch" placeholder="İsim veya telefon ile ara..." style="max-width:400px" oninput="searchCust()"></div>
        <div class="table-wrapper"><table><thead><tr><th>Müşteri</th><th>Telefon</th><th>Araçlar</th><th>Ziyaret</th><th>Toplam Harcama</th><th>Kayıt</th></tr></thead><tbody id="custTable"></tbody></table></div>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="newCustModal"><div class="modal">
    <div class="modal-header"><div class="modal-title">Yeni Müşteri</div><button class="modal-close" onclick="closeModal('newCustModal')"><svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 6 6 18'/><path d='m6 6 12 12'/></svg></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Ad Soyad *</label><input type="text" class="form-input" id="ncName"></div>
      <div class="form-group"><label class="form-label">Telefon *</label><input type="text" class="form-input" id="ncPhone"></div>
      <div class="form-group"><label class="form-label">E-posta</label><input type="email" class="form-input" id="ncEmail"></div>
      <div class="form-group"><label class="form-label">Not</label><textarea class="form-textarea" id="ncNotes"></textarea></div>
      <button class="btn btn-success btn-lg" style="width:100%" onclick="addCust()">Kaydet</button>
    </div>
  </div></div>
  <script src="/js/icons.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let currentUser;
    window.addEventListener("load",async()=>{currentUser=await checkAuth();if(!currentUser)return;document.getElementById("sidebar").innerHTML=renderSidebar(currentUser);initSidebar("customers");loadCusts()});
    let st;function searchCust(){clearTimeout(st);st=setTimeout(loadCusts,300)}
    async function loadCusts(){const s=document.getElementById("custSearch").value.trim();try{const url=s?`/api/customers?search=${encodeURIComponent(s)}`:"/api/customers";const custs=await api(url);const tb=document.getElementById("custTable");if(!custs.length){tb.innerHTML='<tr><td colspan="6"><div class="empty-state"><p>Müşteri bulunamadı</p></div></td></tr>';return}tb.innerHTML=custs.map(c=>`<tr style="cursor:pointer" onclick="window.location.href='/customers/${c.id}'"><td><strong>${escapeHtml(c.name)}</strong>${c.email?`<br><small class="text-muted">${escapeHtml(c.email)}</small>`:""}</td><td class="font-mono">${escapeHtml(c.phone)}</td><td id="veh-${c.id}"><small class="text-muted">...</small></td><td class="font-mono">${c.total_visits}</td><td class="font-mono text-success fw-700">${formatMoney(c.total_spent)}</td><td><small>${formatDate(c.created_at)}</small></td></tr>`).join("");for(const c of custs)loadVeh(c.id)}catch(e){showToast(e.message,"error")}}
    async function loadVeh(cid){try{const v=await api(`/api/vehicles?customer_id=${cid}`);const el=document.getElementById(`veh-${cid}`);if(el)el.innerHTML=v.map(x=>`<span class="font-mono" style="font-size:12px;background:var(--bg-hover);padding:2px 6px;border-radius:4px;margin-right:4px">${escapeHtml(x.plate)}</span>`).join("")||'<small class="text-muted">-</small>'}catch(e){}}
    async function addCust(){const n=document.getElementById("ncName").value.trim(),p=document.getElementById("ncPhone").value.trim(),e=document.getElementById("ncEmail").value.trim(),no=document.getElementById("ncNotes").value.trim();if(!n||!p){showToast("İsim ve telefon gerekli","error");return}try{await api("/api/customers",{method:"POST",body:{name:n,phone:p,email:e,notes:no}});showToast("Kaydedildi","success");closeModal("newCustModal");document.getElementById("ncName").value="";document.getElementById("ncPhone").value="";document.getElementById("ncEmail").value="";document.getElementById("ncNotes").value="";loadCusts()}catch(e){showToast(e.message,"error")}}
  </script>
</body>
</html>
