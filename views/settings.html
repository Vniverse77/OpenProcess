<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ayarlar — OpenProcess</title><link rel="stylesheet" href="/css/style.css">
<style>
  .editable-price{cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s}
  .editable-price:hover{background:var(--accent-subtle);outline:1px dashed var(--accent)}
  .inline-edit{display:inline-flex;align-items:center;gap:4px}
  .inline-edit input{width:90px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;background:var(--bg-input);border:1px solid var(--accent);border-radius:4px;color:var(--text-primary);outline:none}
  .inline-edit button{padding:4px 6px;font-size:11px;border-radius:4px;border:none;cursor:pointer}
  .inline-edit .save-btn{background:var(--success);color:#fff}
  .inline-edit .cancel-btn{background:var(--bg-hover);color:var(--text-secondary)}
  .svc-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s}
  tr:hover .svc-actions{opacity:1}
</style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header"><div><button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='4' x2='20' y1='12' y2='12'/><line x1='4' x2='20' y1='6' y2='6'/><line x1='4' x2='20' y1='18' y2='18'/></svg></button><div class="page-title">Ayarlar</div><div class="page-subtitle">Hizmetler, personel ve sistem ayarları</div></div></div>
      <div class="page-body">
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><div class="card-title">Hizmetler</div><button class="btn btn-primary btn-sm" onclick="openModal('newSvcModal')"><svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12h14'/><path d='M12 5v14'/></svg> Yeni</button></div>
            <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Fiyata tıklayarak hızlıca düzenleyebilirsiniz</p>
            <div class="table-wrapper" style="max-height:500px;overflow-y:auto"><table><thead><tr><th>Hizmet</th><th>Kategori</th><th>Fiyat</th><th>Süre</th><th style="width:80px"></th></tr></thead><tbody id="svcTable"></tbody></table></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Personel</div><button class="btn btn-primary btn-sm" onclick="openModal('newUserModal')"><svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12h14'/><path d='M12 5v14'/></svg> Yeni</button></div>
            <div class="table-wrapper"><table><thead><tr><th>İsim</th><th>Kullanıcı</th><th>Rol</th><th>Durum</th></tr></thead><tbody id="usersTable"></tbody></table></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- New Service Modal -->
  <div class="modal-overlay" id="newSvcModal"><div class="modal">
    <div class="modal-header"><div class="modal-title">Yeni Hizmet</div><button class="modal-close" onclick="closeModal('newSvcModal')"><svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 6 6 18'/><path d='m6 6 12 12'/></svg></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Hizmet Adı *</label><input type="text" class="form-input" id="nsName"></div>
      <div class="grid-2"><div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="nsCat"><option value="yikama">Yıkama</option><option value="detailing">Detailing</option><option value="ic_temizlik">İç Temizlik</option><option value="aksesuar">Aksesuar</option><option value="genel">Genel</option></select></div><div class="form-group"><label class="form-label">Fiyat (₺) *</label><input type="number" class="form-input" id="nsPrice"></div></div>
      <div class="form-group"><label class="form-label">Süre (dk)</label><input type="number" class="form-input" id="nsDur" value="60"></div>
      <button class="btn btn-success btn-lg" style="width:100%" onclick="addSvc()">Kaydet</button>
    </div>
  </div></div>

  <!-- Edit Service Modal -->
  <div class="modal-overlay" id="editSvcModal"><div class="modal">
    <div class="modal-header"><div class="modal-title">Hizmet Düzenle</div><button class="modal-close" onclick="closeModal('editSvcModal')"><svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 6 6 18'/><path d='m6 6 12 12'/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="esId">
      <div class="form-group"><label class="form-label">Hizmet Adı *</label><input type="text" class="form-input" id="esName"></div>
      <div class="grid-2"><div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="esCat"><option value="yikama">Yıkama</option><option value="detailing">Detailing</option><option value="ic_temizlik">İç Temizlik</option><option value="aksesuar">Aksesuar</option><option value="genel">Genel</option></select></div><div class="form-group"><label class="form-label">Fiyat (₺) *</label><input type="number" class="form-input" id="esPrice"></div></div>
      <div class="form-group"><label class="form-label">Süre (dk)</label><input type="number" class="form-input" id="esDur"></div>
      <button class="btn btn-success btn-lg" style="width:100%" onclick="updateSvc()">Güncelle</button>
    </div>
  </div></div>

  <!-- New User Modal -->
  <div class="modal-overlay" id="newUserModal"><div class="modal">
    <div class="modal-header"><div class="modal-title">Yeni Personel</div><button class="modal-close" onclick="closeModal('newUserModal')"><svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 6 6 18'/><path d='m6 6 12 12'/></svg></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Ad Soyad *</label><input type="text" class="form-input" id="nuName"></div>
      <div class="grid-2"><div class="form-group"><label class="form-label">Kullanıcı Adı *</label><input type="text" class="form-input" id="nuUser"></div><div class="form-group"><label class="form-label">Şifre *</label><input type="password" class="form-input" id="nuPass"></div></div>
      <div class="grid-2"><div class="form-group"><label class="form-label">Rol</label><select class="form-select" id="nuRole"><option value="staff">Personel</option><option value="admin">Yönetici</option></select></div><div class="form-group"><label class="form-label">Telefon</label><input type="text" class="form-input" id="nuPhone"></div></div>
      <button class="btn btn-success btn-lg" style="width:100%" onclick="addUser()">Kaydet</button>
    </div>
  </div></div>

  <script src="/js/icons.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let currentUser, allSvcs=[];
    window.addEventListener("load",async()=>{currentUser=await checkAuth();if(!currentUser)return;document.getElementById("sidebar").innerHTML=renderSidebar(currentUser);initSidebar("settings");loadData()});

    async function loadData(){
      try{
        allSvcs=await api("/api/services");
        document.getElementById("svcTable").innerHTML=allSvcs.map(x=>`<tr>
          <td><strong>${escapeHtml(x.name)}</strong></td>
          <td>${categoryLabel(x.category)}</td>
          <td><span class="editable-price font-mono fw-700" onclick="inlineEdit(this,${x.id},${x.price})" title="Tıklayarak düzenle">${formatMoney(x.price)}</span></td>
          <td class="text-muted">${x.duration_minutes} dk</td>
          <td><div class="svc-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal(${x.id})" title="Düzenle">${icon('wrench',13)}</button>
            <button class="btn btn-ghost btn-sm" onclick="deleteSvc(${x.id},'${escapeHtml(x.name)}')" title="Sil" style="color:var(--danger)">${icon('x',13)}</button>
          </div></td>
        </tr>`).join("")
      }catch(e){}
      if(currentUser.role==="admin"){try{const u=await api("/api/users");document.getElementById("usersTable").innerHTML=u.map(x=>`<tr><td><strong>${escapeHtml(x.name)}</strong></td><td class="font-mono">${escapeHtml(x.username)}</td><td>${x.role==="admin"?'<span class="badge badge-in-progress">Yönetici</span>':'<span class="badge badge-delivered">Personel</span>'}</td><td>${x.active?'<span class="text-success">Aktif</span>':'<span class="text-muted">Pasif</span>'}</td></tr>`).join("")}catch(e){}}
    }

    // Inline price edit
    function inlineEdit(el,id,currentPrice){
      const td=el.parentElement;
      td.innerHTML=`<div class="inline-edit"><input type="number" id="ip_${id}" value="${currentPrice}" onkeydown="if(event.key==='Enter')saveInline(${id});if(event.key==='Escape')loadData()"><button class="save-btn" onclick="saveInline(${id})">✓</button><button class="cancel-btn" onclick="loadData()">✗</button></div>`;
      const inp=document.getElementById(`ip_${id}`);inp.focus();inp.select();
    }

    async function saveInline(id){
      const price=parseFloat(document.getElementById(`ip_${id}`).value);
      if(!price||price<=0){showToast("Geçerli fiyat girin","error");return}
      const svc=allSvcs.find(s=>s.id===id);
      try{
        await api(`/api/services/${id}`,{method:"PUT",body:{name:svc.name,category:svc.category,price,duration_minutes:svc.duration_minutes,description:svc.description,active:true}});
        showToast(`${svc.name}: ${formatMoney(price)}`,"success");
        loadData();
      }catch(e){showToast(e.message,"error")}
    }

    // Modal edit
    function openEditModal(id){
      const s=allSvcs.find(x=>x.id===id);if(!s)return;
      document.getElementById("esId").value=s.id;
      document.getElementById("esName").value=s.name;
      document.getElementById("esCat").value=s.category;
      document.getElementById("esPrice").value=s.price;
      document.getElementById("esDur").value=s.duration_minutes;
      openModal("editSvcModal");
    }

    async function updateSvc(){
      const id=document.getElementById("esId").value;
      const name=document.getElementById("esName").value.trim();
      const cat=document.getElementById("esCat").value;
      const price=parseFloat(document.getElementById("esPrice").value);
      const dur=parseInt(document.getElementById("esDur").value)||30;
      if(!name||!price){showToast("İsim ve fiyat gerekli","error");return}
      try{
        await api(`/api/services/${id}`,{method:"PUT",body:{name,category:cat,price,duration_minutes:dur,active:true}});
        showToast("Güncellendi","success");closeModal("editSvcModal");loadData();
      }catch(e){showToast(e.message,"error")}
    }

    // Delete
    async function deleteSvc(id,name){
      if(!confirm(`"${name}" hizmetini silmek istediğinize emin misiniz?`))return;
      try{await api(`/api/services/${id}`,{method:"DELETE"});showToast("Silindi","success");loadData()}catch(e){showToast(e.message,"error")}
    }

    // Add new
    async function addSvc(){const n=document.getElementById("nsName").value.trim(),c=document.getElementById("nsCat").value,p=document.getElementById("nsPrice").value,d=document.getElementById("nsDur").value;if(!n||!p){showToast("İsim ve fiyat gerekli","error");return}try{await api("/api/services",{method:"POST",body:{name:n,category:c,price:parseFloat(p),duration_minutes:parseInt(d)||30}});showToast("Eklendi","success");closeModal("newSvcModal");document.getElementById("nsName").value="";document.getElementById("nsPrice").value="";loadData()}catch(e){showToast(e.message,"error")}}
    async function addUser(){const n=document.getElementById("nuName").value.trim(),u=document.getElementById("nuUser").value.trim(),p=document.getElementById("nuPass").value,r=document.getElementById("nuRole").value,ph=document.getElementById("nuPhone").value.trim();if(!n||!u||!p){showToast("İsim, kullanıcı adı ve şifre gerekli","error");return}try{await api("/api/users",{method:"POST",body:{name:n,username:u,password:p,role:r,phone:ph}});showToast("Eklendi","success");closeModal("newUserModal");loadData()}catch(e){showToast(e.message,"error")}}
  </script>
</body>
</html>
