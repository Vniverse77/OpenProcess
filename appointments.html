<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Randevular — OpenProcess</title>
        <link rel="stylesheet" href="/css/style.css" />
    </head>
    <body>
        <div class="app-layout">
            <aside class="sidebar" id="sidebar"></aside>
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <button
                            class="mobile-menu-btn"
                            onclick="
                                document
                                    .getElementById('sidebar')
                                    .classList.toggle('open')
                            "
                        >
                            ☰
                        </button>
                        <div class="page-title">Randevular</div>
                    </div>
                    <button
                        class="btn btn-primary"
                        onclick="openModal('newApptModal')"
                    >
                        + Yeni Randevu
                    </button>
                </div>
                <div class="page-body">
                    <div class="flex gap-8 mb-24">
                        <input
                            type="date"
                            class="form-input"
                            id="apptDateFilter"
                            onchange="loadAppointments()"
                            style="width: 180px"
                        />
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Tarih</th>
                                    <th>Saat</th>
                                    <th>Müşteri</th>
                                    <th>Araç</th>
                                    <th>Notlar</th>
                                    <th>Durum</th>
                                    <th>İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="apptTable"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
        <div class="modal-overlay" id="newApptModal">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">Yeni Randevu</div>
                    <button
                        class="modal-close"
                        onclick="closeModal('newApptModal')"
                    >
                        ✕
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Müşteri Ara</label
                        ><input
                            type="text"
                            class="form-input"
                            id="apptCustSearch"
                            placeholder="İsim veya telefon..."
                            oninput="searchCust()"
                        />
                        <div id="apptCustResults" class="mt-8"></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Tarih *</label
                            ><input
                                type="date"
                                class="form-input"
                                id="apptDate"
                            />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Saat *</label
                            ><input
                                type="time"
                                class="form-input"
                                id="apptTime"
                            />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Notlar</label
                        ><textarea
                            class="form-textarea"
                            id="apptNotes"
                        ></textarea>
                    </div>
                    <button
                        class="btn btn-success btn-lg"
                        style="width: 100%"
                        onclick="createAppt()"
                    >
                        Randevu Oluştur
                    </button>
                </div>
            </div>
        </div>
        <script src="/js/app.js"></script>
        <script>
            let currentUser,
                selCust = null;
            window.addEventListener("load", async () => {
                currentUser = await checkAuth();
                if (!currentUser) return;
                document.getElementById("sidebar").innerHTML =
                    renderSidebar(currentUser);
                initSidebar("appointments");
                document.getElementById("apptDateFilter").value = new Date()
                    .toISOString()
                    .split("T")[0];
                document.getElementById("apptDate").value = new Date()
                    .toISOString()
                    .split("T")[0];
                loadAppointments();
            });
            async function loadAppointments() {
                const d = document.getElementById("apptDateFilter").value;
                try {
                    const a = await api(`/api/appointments?date=${d}`);
                    const tb = document.getElementById("apptTable");
                    if (!a.length) {
                        tb.innerHTML =
                            '<tr><td colspan="7"><div class="empty-state"><p>Bu tarihte randevu yok</p></div></td></tr>';
                        return;
                    }
                    const sm = {
                            pending: "Bekliyor",
                            confirmed: "Onaylı",
                            completed: "Tamamlandı",
                            cancelled: "İptal",
                        },
                        bm = {
                            pending: "waiting",
                            confirmed: "in-progress",
                            completed: "completed",
                            cancelled: "cancelled",
                        };
                    tb.innerHTML = a
                        .map((r) => {
                            let act = "";
                            if (r.status === "pending")
                                act = `<button class="btn btn-success btn-sm" onclick="updAppt(${r.id},'confirmed')">Onayla</button><button class="btn btn-danger btn-sm" onclick="updAppt(${r.id},'cancelled')">İptal</button>`;
                            if (r.status === "confirmed")
                                act = `<button class="btn btn-primary btn-sm" onclick="updAppt(${r.id},'completed')">Tamamla</button>`;
                            return `<tr><td>${formatDate(r.appointment_date)}</td><td class="font-mono fw-700">${r.appointment_time?.slice(0, 5)}</td><td>${escapeHtml(r.customer_name)}<br><small class="text-muted">${escapeHtml(r.customer_phone)}</small></td><td class="font-mono">${escapeHtml(r.plate || "-")}</td><td><small>${escapeHtml(r.service_notes || "-")}</small></td><td><span class="badge badge-${bm[r.status]}"><span class="badge-dot"></span>${sm[r.status]}</span></td><td>${act}</td></tr>`;
                        })
                        .join("");
                } catch (e) {
                    showToast(e.message, "error");
                }
            }
            let st;
            function searchCust() {
                clearTimeout(st);
                const q = document
                    .getElementById("apptCustSearch")
                    .value.trim();
                if (q.length < 2) {
                    document.getElementById("apptCustResults").innerHTML = "";
                    return;
                }
                st = setTimeout(async () => {
                    try {
                        const c = await api(
                            `/api/customers?search=${encodeURIComponent(q)}`,
                        );
                        document.getElementById("apptCustResults").innerHTML = c
                            .slice(0, 5)
                            .map(
                                (r) =>
                                    `<div style="padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer" onclick="pickCust(${r.id},'${escapeHtml(r.name)}')"><strong>${escapeHtml(r.name)}</strong> <span class="text-muted">— ${escapeHtml(r.phone)}</span></div>`,
                            )
                            .join("");
                    } catch (e) {}
                }, 300);
            }
            function pickCust(id, n) {
                selCust = id;
                document.getElementById("apptCustSearch").value = n;
                document.getElementById("apptCustResults").innerHTML =
                    `<div style="color:var(--success);font-size:12px">✓ ${n} seçildi</div>`;
            }
            async function createAppt() {
                if (!selCust) {
                    showToast("Müşteri seçin", "error");
                    return;
                }
                const d = document.getElementById("apptDate").value,
                    t = document.getElementById("apptTime").value,
                    n = document.getElementById("apptNotes").value;
                if (!d || !t) {
                    showToast("Tarih ve saat gerekli", "error");
                    return;
                }
                try {
                    await api("/api/appointments", {
                        method: "POST",
                        body: {
                            customer_id: selCust,
                            appointment_date: d,
                            appointment_time: t,
                            service_notes: n,
                        },
                    });
                    showToast("Randevu oluşturuldu", "success");
                    closeModal("newApptModal");
                    selCust = null;
                    loadAppointments();
                } catch (e) {
                    showToast(e.message, "error");
                }
            }
            async function updAppt(id, s) {
                try {
                    await api(`/api/appointments/${id}/status`, {
                        method: "PATCH",
                        body: { status: s },
                    });
                    showToast("Güncellendi", "success");
                    loadAppointments();
                } catch (e) {
                    showToast(e.message, "error");
                }
            }
        </script>
    </body>
</html>
